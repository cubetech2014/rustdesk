# RustDesk 포크 저장소의 .github/workflows/build.yml 로 복사
# 태그 push (v*) 시 Agent + Viewer 2 flavor × Android/Windows 빌드

name: CubeRemote Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  NDK_VERSION: "r27"
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"

jobs:
  # ---------- Android ----------
  build-android:
    name: Android ${{ matrix.flavor }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        flavor: [agent, viewer]
        include:
          - flavor: agent
            arch: aarch64
            rust_target: aarch64-linux-android
            flutter_abi: arm64-v8a
          - flavor: viewer
            arch: aarch64
            rust_target: aarch64-linux-android
            flutter_abi: arm64-v8a
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.rust_target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version ^3

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --locked

      - name: Rebrand
        run: bash rebrand.sh ${{ matrix.flavor }}

      - name: Generate Rust bridge
        run: |
          dart pub global activate ffigen
          dart pub global activate ffi
          cd flutter
          flutter pub get
          cd ..
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h || true

      - name: Build Rust library for Android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export NDK_HOME=$ANDROID_NDK_HOME
          cargo ndk --target ${{ matrix.rust_target }} --platform 21 -- build --release --features flutter
          mkdir -p flutter/android/app/src/main/jniLibs/${{ matrix.flutter_abi }}
          cp target/${{ matrix.rust_target }}/release/liblibrustdesk.so flutter/android/app/src/main/jniLibs/${{ matrix.flutter_abi }}/librustdesk.so

      - name: Build APK
        working-directory: flutter
        run: flutter build apk --release --target-platform android-arm64 --dart-define=CUBE_FLAVOR=${{ matrix.flavor }}

      - name: Rename APK
        run: |
          mkdir -p release
          cp flutter/build/app/outputs/flutter-apk/app-release.apk \
             release/CubeRemote-${{ matrix.flavor }}-${GITHUB_REF_NAME}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: cuberemote-${{ matrix.flavor }}-android
          path: release/*.apk

  # ---------- Windows ----------
  build-windows:
    name: Windows ${{ matrix.flavor }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [agent, viewer]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install vcpkg deps
        run: |
          vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static

      - name: Rebrand
        shell: bash
        run: bash rebrand.sh ${{ matrix.flavor }}

      - name: Build Windows
        shell: bash
        run: cargo build --release

      - name: Rename EXE
        shell: bash
        run: |
          mkdir -p release
          cp target/release/rustdesk.exe \
             release/CubeRemote-${{ matrix.flavor }}-${GITHUB_REF_NAME}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: cuberemote-${{ matrix.flavor }}-windows
          path: release/*.exe

  # ---------- Release ----------
  release:
    needs: [build-android, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v1
        with:
          files: |
            cuberemote-agent-android/*.apk
            cuberemote-viewer-android/*.apk
            cuberemote-agent-windows/*.exe
            cuberemote-viewer-windows/*.exe
          generate_release_notes: true
