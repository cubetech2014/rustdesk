# RustDesk 포크 저장소의 .github/workflows/build.yml 로 복사하여 사용
# 태그 push (v*) 시 Agent + Viewer 두 flavor 각각 APK + EXE 빌드
name: CubeRemote Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    name: Android ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [agent, viewer]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - uses: dtolnay/rust-toolchain@stable

      - name: Rebrand
        run: bash rebrand.sh ${{ matrix.flavor }}

      - name: Build APK
        working-directory: flutter
        run: flutter build apk --release --dart-define=CUBE_FLAVOR=${{ matrix.flavor }}

      - name: Rename APK
        run: |
          mkdir -p release
          cp flutter/build/app/outputs/flutter-apk/app-release.apk \
             release/CubeRemote-${{ matrix.flavor }}-${GITHUB_REF_NAME}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: cuberemote-${{ matrix.flavor }}-android
          path: release/*.apk

  build-windows:
    name: Windows ${{ matrix.flavor }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [agent, viewer]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Rebrand
        shell: bash
        run: bash rebrand.sh ${{ matrix.flavor }}

      - name: Build Windows
        shell: bash
        run: cargo build --release

      - name: Rename EXE
        shell: bash
        run: |
          mkdir -p release
          cp target/release/rustdesk.exe \
             release/CubeRemote-${{ matrix.flavor }}-${GITHUB_REF_NAME}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: cuberemote-${{ matrix.flavor }}-windows
          path: release/*.exe

  release:
    needs: [build-android, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v1
        with:
          files: |
            cuberemote-agent-android/*.apk
            cuberemote-viewer-android/*.apk
            cuberemote-agent-windows/*.exe
            cuberemote-viewer-windows/*.exe
          generate_release_notes: true
